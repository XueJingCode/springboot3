<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div id="container">
    <form action="add">
        <div class="align">
            <label>编号</label>
            <input type="text" placeholder="请输入编号" name="number">
        </div>
        <div class="align">
            <label>部门</label>
            <select name="dep.id">
                <option th:each="dep:${depList}" th:text="${dep.name}" th:value="${dep.id}"></option>
            </select>
        </div>
        <div class="align">
            <button type="submit">保存</button>
        </div>
    </form>
</div>
</body>
</html>
